<!DOCTYPE html>
<html>
<head>
<title>Tuấn Xuôi-Quản lý chất lượng</title>
</head>
<body>
<iframe src="https://www.appsheet.com/start/f0e39619-c6a5-4381-a9ff-7ff8a49bba91"
width="100%"
height="100%"
allowfullscreen="true"
style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
<script>
window.onload = function() {
document.querySelector('iframe').requestFullscreen().catch((err) => {
console.error(`Error attempting to enable full-screen mode: ${err.message}`);
});
};
</script>
</body>
</html>
